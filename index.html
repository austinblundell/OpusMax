<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>OpusMax Hoops — 3D Basketball</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="stylesheet" href="./src/ui/styles.css" />
</head>
<body>
  <div id="app">
    <canvas id="game-canvas"></canvas>

    <!-- Loading screen -->
    <div id="loading" class="overlay">
      <div class="loader-inner">
        <div class="loader-logo">OPUSMAX <span>HOOPS</span></div>
        <div class="loader-bar"><div id="loader-fill"></div></div>
        <div id="loader-status">Loading arena…</div>
      </div>
    </div>

    <!-- Main menu -->
    <div id="menu" class="overlay hidden">
      <div class="menu-card">
        <div class="menu-title">OPUSMAX <span>HOOPS</span></div>
        <div class="menu-sub">Realistic 3D Basketball</div>

        <div class="menu-modes">
          <button class="mode-btn active" data-mode="freestyle">
            <span class="mode-name">Freestyle</span>
            <span class="mode-desc">Practice your shot. No clock, no pressure.</span>
          </button>
          <button class="mode-btn" data-mode="arcade">
            <span class="mode-name">60-Second Challenge</span>
            <span class="mode-desc">Score as much as you can before time runs out.</span>
          </button>
          <button class="mode-btn" data-mode="1v1">
            <span class="mode-name">1-on-1 vs CPU</span>
            <span class="mode-desc">Beat the defender. First to 11 wins.</span>
          </button>
        </div>

        <button id="play-btn" class="play-btn">PLAY</button>

        <div class="menu-controls">
          <div class="ctrl-col">
            <div class="ctrl-row"><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd><span>Move</span></div>
            <div class="ctrl-row"><kbd>SHIFT</kbd><span>Sprint</span></div>
            <div class="ctrl-row"><kbd>SPACE</kbd><span>Hold to aim &amp; shoot</span></div>
          </div>
          <div class="ctrl-col">
            <div class="ctrl-row"><kbd>E</kbd><span>Crossover / juke</span></div>
            <div class="ctrl-row"><kbd>Mouse</kbd><span>Look around</span></div>
            <div class="ctrl-row"><kbd>C</kbd><span>Switch camera</span></div>
          </div>
        </div>
      </div>
    </div>

    <!-- In-game HUD -->
    <div id="hud" class="hidden">
      <div class="scoreboard">
        <div class="sb-team home">
          <span class="sb-label">YOU</span>
          <span id="score-you" class="sb-score">0</span>
        </div>
        <div class="sb-center">
          <div id="game-clock" class="sb-clock">12:00</div>
          <div class="sb-quarter"><span id="shot-clock">24</span></div>
        </div>
        <div class="sb-team away">
          <span id="score-cpu" class="sb-score">0</span>
          <span class="sb-label">CPU</span>
        </div>
      </div>

      <div id="announce" class="announce"></div>

      <div id="streak" class="streak hidden"></div>

      <!-- Shot meter -->
      <div id="shot-meter" class="shot-meter hidden">
        <div class="meter-track">
          <div id="meter-perfect" class="meter-perfect"></div>
          <div id="meter-fill" class="meter-fill"></div>
          <div id="meter-marker" class="meter-marker"></div>
        </div>
        <div class="meter-label">RELEASE</div>
      </div>

      <div class="hud-hint" id="hud-hint">Hold <kbd>SPACE</kbd> to shoot • <kbd>C</kbd> camera</div>
    </div>

    <!-- Results screen -->
    <div id="results" class="overlay hidden">
      <div class="menu-card">
        <div class="results-title" id="results-title">TIME!</div>
        <div class="results-stats" id="results-stats"></div>
        <button id="again-btn" class="play-btn">PLAY AGAIN</button>
      </div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
